    <script>
      // SPA path restore (paired with public/404.html)
      (function(){
        var s = window.location.search;
        var m = s.match(/^\?\/(.*)/);
        if (m) {
          var decoded = decodeURIComponent(m[1]);
          window.history.replaceState(null, '', decoded + window.location.hash);
        }
      })();
    </script>
