<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Maddy's Memories</title>
<script>
  // SPA fallback for GitHub Pages: encode path and redirect to /
  // index.html restores it on load.
  (function(){
    var l = window.location;
    var path = l.pathname + l.search;
    l.replace(l.origin + '/?/' + encodeURIComponent(path) + l.hash);
  })();
</script>
</head>

</html>
